name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r AutoTest_Backend/requirements.txt
      - name: Run backend tests
        run: python AutoTest_Backend/run_backend_tests.py

  frontend-checks:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: AutoTest_Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: AutoTest_Frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests (vitest)
        run: npm test
      - name: Build frontend
        run: npm run build
